<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thử thách Nguyên âm - English Vowels</title>
    <style>
        :root {
            --primary: #00cec9;
            --secondary: #6c5ce7;
            --success: #2ecc71;
            --error: #ff7675;
            --bg: #f0f3f7;
            --card-bg: #ffffff;
            --text: #2d3436;
        }

        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: var(--bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: var(--text);
        }

        .box {
            background: var(--card-bg);
            padding: 3rem;
            border-radius: 2.5rem;
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 32rem;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* LOGIN UI/UX GỐC */
        #login-screen { display: flex; flex-direction: column; align-items: center; gap: 1.5rem; }
        .google-btn {
            background: white; color: #2d3436; border: 1px solid #dfe6e9;
            padding: 1rem 2rem; border-radius: 50px; cursor: pointer;
            display: flex; align-items: center; gap: 12px; font-weight: bold;
            box-shadow: 0 8px 15px rgba(0,0,0,0.05); transition: 0.3s;
        }
        .google-btn:hover { transform: translateY(-3px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }

        #main-content { display: none; }
        .progress-container { width: 100%; height: 12px; background: #eee; border-radius: 6px; margin: 1.5rem 0; overflow: hidden; border: 1px solid #ddd; }
        #progress-bar { height: 100%; background: var(--secondary); width: 0%; transition: 0.4s; }

        .row { display: grid; gap: 1.2rem; margin-bottom: 1.5rem; }
        .col-2 { grid-template-columns: 1fr 1fr; }
        .col-3 { grid-template-columns: 1fr 1fr 1fr; }

        .btn {
            position: relative;
            padding: 1.5rem 0.5rem; border: 2px solid #dfe6e9; border-radius: 1.2rem;
            cursor: pointer; font-size: 1.8rem; background: white; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex; justify-content: center; align-items: center; font-weight: bold;
            box-shadow: 0 6px 0 #dfe6e9; outline: none; min-height: 90px;
        }

        /* BADGE SỐ TƯƠNG PHẢN CAO */
        .btn-num {
            position: absolute; top: -8px; left: -8px;
            background: #2d3436; color: #ffffff; font-size: 0.8rem;
            width: 26px; height: 26px; display: flex; 
            justify-content: center; align-items: center;
            border-radius: 50%; border: 2px solid white;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
            z-index: 5;
        }

        .btn:hover:not(.matched) { transform: translateY(-7px); box-shadow: 0 13px 0 #dfe6e9; border-color: var(--primary); }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #dfe6e9; }

        .selected { border-color: var(--secondary) !important; background: #f3f0ff !important; box-shadow: 0 6px 0 var(--secondary) !important; transform: scale(1.05); }
        
        .matched { color: white !important; transform: none !important; cursor: default; }
        .match-a { background: var(--success) !important; border-color: var(--success) !important; box-shadow: 0 4px 0 #27ae60 !important; }
        .match-b { background: #9b59b6 !important; border-color: #9b59b6 !important; box-shadow: 0 4px 0 #8e44ad !important; }
        .match-c { background: #e67e22 !important; border-color: #e67e22 !important; box-shadow: 0 4px 0 #d35400 !important; }

        .shake { animation: shake 0.4s; }
        @keyframes shake { 0%, 100% {transform: translateX(0);} 25% {transform: translateX(-6px);} 75% {transform: translateX(6px);} }

        .nav-container { display: flex; justify-content: space-between; gap: 1rem; margin-top: 2rem; }
        .nav-btn { background: #2d3436; color: white; padding: 1rem; border: none; border-radius: 15px; cursor: pointer; flex: 1; font-weight: bold; box-shadow: 0 5px 0 #000; }
        .nav-btn:disabled { opacity: 0.2; }

        .btn-restart { background: var(--success); color: white; border: none; padding: 1.2rem 3rem; border-radius: 50px; cursor: pointer; font-weight: bold; margin-top: 1.5rem; box-shadow: 0 8px 15px rgba(46, 204, 113, 0.3); }
    </style>
</head>
<body>

<div class="box">
    <div id="login-screen">
        <h2 style="margin: 0;">Thử thách Nguyên âm</h2>
        <p style="color: #636e72;">Vui lòng đăng nhập để làm bài tập</p>
        <button id="login-btn" class="google-btn">
            <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"></path><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"></path><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59L2.56 13.22C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"></path><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"></path></svg>
            Tiếp tục với Google
        </button>
        <p id="login-msg" style="color: var(--error); font-size: 0.9rem; font-weight: bold;"></p>
    </div>

    <div id="main-content">
        <h3 id="title" style="margin: 0; font-size: 1.2rem;">Cặp âm 1/9</h3>
        <div class="progress-container"><div id="progress-bar"></div></div>
        
        <div id="game-ui">
            <div id="audio-row" class="row"></div>
            <div id="text-row" class="row"></div>
            <button id="ans-toggle-btn" onclick="toggleAnswer()" style="width: 100%; border: none; background: #f1f5f9; padding: 12px; border-radius: 12px; cursor: pointer; font-weight: bold; color: #64748b; margin-bottom: 10px;">Hiện đáp án</button>
        </div>

        <div id="finish-ui" style="display:none;">
            <h2 style="color: var(--success);">Hoàn thành! 🎉</h2>
            <p id="result-text" style="font-weight: bold; margin-bottom: 1.5rem;"></p>
            <img src="https://media2.giphy.com/media/bCcxY1ADkAqfS/giphy.gif" style="width: 100%; max-width: 220px; border-radius: 1.5rem; border: 5px solid var(--secondary);">
            <br>
            <button class="btn-restart" onclick="restartGame()">Làm lại thử thách</button>
        </div>

        <div class="nav-container">
            <button class="nav-btn" id="prev" onclick="changePage(-1)"> &larr; Trước</button>
            <button class="nav-btn" id="next" onclick="changePage(1)">Sau &rarr;</button>
        </div>
    </div>
</div>

<audio id="snd-win" src="https://tiengdong.com/wp-content/uploads/Am-thanh-chuc-mung-chien-thang-www_tiengdong_com.mp3?_=1"></audio>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCdlTVHwiLOGMnrFe12DE1dQSEHZaJ594I",
        authDomain: "nguyen-am-tieng-anh.firebaseapp.com",
        projectId: "nguyen-am-tieng-anh",
        storageBucket: "nguyen-am-tieng-anh.firebasestorage.app",
        messagingSenderId: "878440633705",
        appId: "1:878440633705:web:755de6cb273eb139ebd9f8",
        measurementId: "G-EM8Y1QW6QH"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    let audioCtx;
    function playBeep(type) {
        if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(type === 'correct' ? 880 : 150, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
        osc.start(); osc.stop(audioCtx.currentTime + 0.1);
    }

    window.data = [
        { pair: [{id: '1a', t: '/ɪ/'}, {id: '1b', t: '/i:/'}] },
        { pair: [{id: '2a', t: '/e/'}, {id: '2b', t: '/æ/'}] },
        { pair: [{id: '3a', t: '/ə/'}, {id: '3b', t: '/ɜ:/'}] },
        { pair: [{id: '4a', t: '/ʊ/'}, {id: '4b', t: '/u:/'}] },
        { pair: [{id: '5a', t: '/ɒ/'}, {id: '5b', t: '/ɔ:/'}] },
        { pair: [{id: '6a', t: '/ʌ/'}, {id: '6b', t: '/ɑ:/'}] },
        { pair: [{id: '7a', t: '/ɪə/'}, {id: '7b', t: '/eə/'}, {id: '7c', t: '/ʊə/'}] },
        { pair: [{id: '8a', t: '/aɪ/'}, {id: '8b', t: '/eɪ/'}, {id: '8c', t: '/ɔɪ/'}] },
        { pair: [{id: '9a', t: '/aʊ/'}, {id: '9b', t: '/oʊ/'}] }
    ];

    let cur = 0, sel = null, completed = [], showingAns = false, cachedOrder = { audio: [], text: [] };

    window.init = function() {
        const gameUi = document.getElementById('game-ui'), finishUi = document.getElementById('finish-ui'),
              prog = document.getElementById('progress-bar'), title = document.getElementById('title');
        
        prog.style.width = ((cur + 1) / window.data.length * 100) + '%';
        
        // MÀN HÌNH KẾT THÚC
        if (cur >= window.data.length) {
            gameUi.style.display = 'none'; finishUi.style.display = 'block';
            title.innerText = "Thành tích";
            document.getElementById('result-text').innerText = `Chúc mừng bạn đã chinh phục 9 cặp nguyên âm!`;
            document.getElementById('snd-win').play().catch(()=>{});
            document.getElementById('next').style.visibility = 'hidden';
            return;
        }

        gameUi.style.display = 'block'; finishUi.style.display = 'none';
        title.innerText = "Cặp âm " + (cur + 1) + "/9";
        document.getElementById('prev').disabled = (cur === 0);
        document.getElementById('next').style.visibility = 'visible';

        const ar = document.getElementById('audio-row'), tr = document.getElementById('text-row');
        const p = window.data[cur].pair;
        ar.className = tr.className = p.length === 3 ? 'row col-3' : 'row col-2';

        if (!cachedOrder.audio.length) {
            cachedOrder.audio = p.map((_, i) => i).sort(() => Math.random() - 0.5);
            cachedOrder.text = p.map((_, i) => i).sort(() => Math.random() - 0.5);
        }

        // LOGIC NHẢY CỘT KHI HIỆN ĐÁP ÁN
        let textDisplayOrder = [...cachedOrder.text];
        if (showingAns) {
            textDisplayOrder = [...cachedOrder.audio]; 
        }

        ar.innerHTML = ''; tr.innerHTML = '';

        cachedOrder.audio.forEach((origIdx, dispIdx) => {
            const item = p[origIdx];
            const isMatched = completed.includes(item.id) || showingAns;
            const btn = document.createElement('div');
            btn.className = `btn${isMatched ? ' matched match-'+item.id.slice(-1) : ''}${sel === item.id ? ' selected' : ''}`;
            btn.innerHTML = `<span class="btn-num">${dispIdx + 1}</span><svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18.01,19.86 21,16.28 21,12C21,7.72 18.01,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z" /></svg>`;
            btn.onclick = () => { new Audio(`${item.id}.mp3`).play(); if (!isMatched) { sel = item.id; window.init(); }};
            ar.appendChild(btn);
        });

        textDisplayOrder.forEach((origIdx) => {
            const item = p[origIdx];
            const isMatched = completed.includes(item.id) || showingAns;
            const btn = document.createElement('div');
            btn.className = `btn${isMatched ? ' matched match-'+item.id.slice(-1) : ''}`;
            btn.innerText = item.t;
            btn.onclick = () => {
                if (isMatched) return;
                if (sel === item.id) { completed.push(item.id); playBeep('correct'); sel = null; window.init(); }
                else if (sel) { btn.classList.add('shake'); setTimeout(()=>btn.classList.remove('shake'), 400); playBeep('wrong'); }
            };
            tr.appendChild(btn);
        });

        document.getElementById('ans-toggle-btn').innerText = showingAns ? "Quay lại" : "Hiện đáp án";
    };

    window.toggleAnswer = () => { showingAns = !showingAns; window.init(); };
    window.changePage = (s) => { 
        cur = Math.max(0, Math.min(window.data.length, cur + s)); 
        completed = []; sel = null; showingAns = false; cachedOrder = { audio: [], text: [] }; 
        window.init(); 
    };
    window.restartGame = () => { cur = 0; completed = []; sel = null; showingAns = false; cachedOrder = { audio: [], text: [] }; window.init(); };

    document.getElementById("login-btn").onclick = async () => {
        try {
            const res = await signInWithPopup(auth, provider);
            const q = query(collection(db, "Tienganh_so_cap"), where("email", "==", res.user.email));
            const snap = await getDocs(q);
            if (!snap.empty) {
                document.getElementById("login-screen").style.display = "none";
                document.getElementById("main-content").style.display = "block";
                window.init();
            } else {
                document.getElementById("login-msg").innerText = "Email không có quyền.";
                await signOut(auth);
            }
        } catch (e) { document.getElementById("login-msg").innerText = "Lỗi đăng nhập."; }
    };
</script>
</body>
</html>
